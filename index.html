<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white font-sans pb-24">

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-4">
        <div class="relative bg-slate-900 border border-white/10 p-8 rounded-[40px] max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-black text-cyan-400 italic uppercase">BioSync Pro</h2>
                <p class="text-[10px] font-bold text-gray-500 tracking-widest uppercase mt-2">Configuración Inicial</p>
            </div>
            
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="user-age" placeholder="Edad" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                    <input type="number" id="user-weight" placeholder="Peso (kg)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                </div>
                
                <select id="user-activity" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="1.2">Poco ejercicio</option>
                    <option value="1.55" selected>Gym 3-5 días</option>
                    <option value="1.9">Atleta Élite</option>
                </select>

                <select id="user-goal" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="perder">Quemar Grasa</option>
                    <option value="recomposicion" selected>Recomposición</option>
                    <option value="ganar">Ganar Músculo</option>
                </select>

                <textarea id="user-likes" placeholder="¿Qué comida te gusta o qué odias?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-24 text-sm text-white resize-none focus:border-cyan-500"></textarea>

                <button onclick="configurarApp()" class="w-full bg-cyan-500 text-black py-5 rounded-[28px] font-black uppercase tracking-widest shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                    Sincronizar Ahora
                </button>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
        <div class="font-black text-cyan-400 italic text-2xl uppercase">BioSync</div>
        <button onclick="resetApp()" class="text-[9px] text-red-500 font-bold border border-red-500/20 px-3 py-1 rounded-full uppercase">Reiniciar</button>
    </nav>

    <main id="capture-area" class="max-w-5xl mx-auto px-6 mt-6">
        <div class="bg-black/40 border border-cyan-500/30 p-6 rounded-[32px] mb-8">
            <p id="ia-insights" class="text-xs font-mono text-cyan-400 leading-relaxed">> Sistema BioSync Pro v2.0 Online...</p>
        </div>

        <section class="mb-10 bg-slate-900/40 border-2 border-dashed border-cyan-500/20 p-8 rounded-[40px] text-center relative overflow-hidden">
            <div class="scanner-line"></div>
            <p class="text-[10px] text-gray-500 mb-4 font-bold uppercase">Análisis Visual de Comida</p>
            <button onclick="document.getElementById('food-camera').click()" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-cyan-400">📸 Usar Cámara</button>
            <input type="file" id="food-camera" accept="image/*" capture="environment" class="hidden" onchange="escanearPlato(event)">
            <div id="scan-result" class="mt-4 hidden p-4 bg-black/60 rounded-2xl border border-cyan-500/20 text-xs font-mono text-cyan-400"></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase">Calorías Meta</p>
                <div class="mt-2 text-4xl font-black text-white" id="cal-meta">0</div>
            </div>
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-blue-500/20">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Agua (L)</p>
                <div class="text-4xl font-black my-1" id="water-count">0.0</div>
                <button onclick="sumarAgua()" class="w-full bg-blue-500/10 py-2 rounded-xl text-[10px] font-black text-blue-400 border border-blue-500/20 uppercase mt-2">+250ml</button>
            </div>
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Progreso XP</p>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden"><div id="xp-bar" class="bg-cyan-400 h-full w-0 transition-all duration-700"></div></div>
                <p id="xp-display" class="text-xs font-black text-cyan-400 mt-2">0 XP</p>
            </div>
        </div>

        <h3 class="text-2xl font-black italic mb-6 uppercase tracking-tighter">Tu Plan de Alimentación IA</h3>
        <div id="dieta-lista" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <button onclick="exportarPDF()" class="fixed bottom-8 right-8 bg-cyan-500 text-black w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl z-50">📄</button>

    <script src="script.js"></script>
</body>
</html>

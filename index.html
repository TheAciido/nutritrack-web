<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync Pro | AI Elite Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white font-sans pb-24 overflow-x-hidden">

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-4 transition-all duration-500">
        <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/10 to-blue-600/10 animate-pulse"></div>
        <div class="relative bg-slate-900/80 border border-white/10 backdrop-blur-2xl p-8 rounded-[48px] max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase">Bio<span class="text-cyan-400">Sync</span> IA</h2>
                <p class="text-[10px] font-bold text-cyan-500/60 tracking-widest uppercase mt-2">Protocolo de Optimización</p>
            </div>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="u-age" placeholder="Edad" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                    <input type="number" id="u-weight" placeholder="Peso (kg)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                </div>
                
                <select id="u-act" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="1.2">Sedentario (Poco ejercicio)</option>
                    <option value="1.55" selected>Activo (Gym 3-5 días)</option>
                    <option value="1.9">Élite (Entreno diario)</option>
                </select>

                <select id="u-goal" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="perder">Quemar Grasa</option>
                    <option value="recomposicion" selected>Recomposición</option>
                    <option value="ganar">Volumen (Músculo)</option>
                </select>

                <textarea id="u-likes" placeholder="¿Qué comida te encanta o detestas?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-24 text-sm text-white resize-none"></textarea>

                <button onclick="iniciarBioSync()" class="w-full bg-cyan-500 text-black py-5 rounded-[28px] font-black uppercase tracking-widest shadow-[0_0_30px_rgba(34,211,238,0.3)] active:scale-95 transition-all">
                    Sincronizar Protocolo
                </button>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <div class="text-2xl font-black text-cyan-400 italic">BIO<span class="text-white">SYNC</span></div>
        <button onclick="resetApp()" class="text-[9px] text-red-500 font-bold border border-red-500/20 px-3 py-1 rounded-full uppercase italic">Reiniciar</button>
    </nav>

    <main id="capture-area" class="max-w-5xl mx-auto px-6 mt-6">
        
        <div class="bg-black/40 border border-cyan-500/30 p-6 rounded-[32px] mb-8">
            <p id="ia-insights" class="text-xs font-mono text-cyan-400 leading-relaxed">> Cargando Bio-Análisis...</p>
        </div>

        <section class="mb-10 bg-slate-900/40 border-2 border-dashed border-cyan-500/20 p-8 rounded-[40px] text-center relative overflow-hidden">
            <div class="scanner-line"></div>
            <button onclick="document.getElementById('food-cam').click()" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-cyan-400 transition-all">📸 Analizar Plato</button>
            <input type="file" id="food-cam" accept="image/*" capture="environment" class="hidden" onchange="escanearComida(event)">
            <div id="scan-res" class="mt-4 hidden p-4 bg-black/60 rounded-2xl border border-cyan-500/20 text-xs font-mono text-cyan-400"></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase italic">Calorías Meta</p>
                <div id="res-cal" class="mt-2 text-4xl font-black text-white">0</div>
            </div>
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-blue-500/20">
                <p class="text-[10px] font-bold text-blue-400 uppercase italic italic">Hidratación</p>
                <div class="text-4xl font-black my-1 text-blue-300"><span id="res-water">0.0</span><span class="text-sm opacity-30">L</span></div>
                <button onclick="addWater()" class="w-full bg-blue-500/10 py-2 rounded-xl text-[10px] font-black text-blue-400 border border-blue-500/20 uppercase mt-2">+250ml</button>
            </div>
            <div class="bg-slate-900/60 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-4 italic">Nivel de Rango</p>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden"><div id="res-xp" class="bg-cyan-400 h-full w-0 transition-all duration-700"></div></div>
                <p id="xp-num" class="text-xs font-black text-cyan-400 mt-2 italic">0 XP</p>
            </div>
        </div>

        <section class="mb-12 bg-slate-900/40 border border-cyan-500/10 p-8 rounded-[48px] shadow-2xl relative overflow-hidden">
            <h3 class="text-2xl font-black italic mb-6 uppercase">Modo Entrenamiento</h3>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="bg-black/60 p-6 rounded-3xl border-l-4 border-cyan-500">
                        <p class="text-[9px] font-black text-cyan-500 uppercase tracking-widest">Ejercicio</p>
                        <span id="gym-ex" class="text-xl font-black text-white italic">Seleccionando...</span>
                    </div>
                    <div class="p-6 bg-cyan-500/5 rounded-3xl border border-cyan-500/10 text-center">
                        <span id="timer" class="text-6xl font-black text-cyan-400 font-mono">00:00</span>
                        <p class="text-[9px] font-black text-gray-500 uppercase mt-2 tracking-widest">Tiempo de Descanso</p>
                    </div>
                </div>
                <div class="flex flex-col justify-center gap-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="g-peso" placeholder="Peso" class="bg-slate-800 p-5 rounded-3xl text-center font-black text-2xl outline-none border border-transparent focus:border-cyan-500/50">
                        <input type="number" id="g-reps" placeholder="Reps" class="bg-slate-800 p-5 rounded-3xl text-center font-black text-2xl outline-none border border-transparent focus:border-cyan-500/50">
                    </div>
                    <button onclick="logGym()" class="w-full bg-white text-black py-5 rounded-3xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Registrar Serie</button>
                </div>
            </div>
        </section>

        <h3 class="text-2xl font-black italic mb-6 uppercase ml-2 tracking-tighter">Dieta Adaptativa 30 Días</h3>
        <div id="res-dieta" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <button onclick="exportarPDF()" class="fixed bottom-8 right-8 bg-cyan-500 text-black w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl z-50 hover:scale-110 active:scale-90 transition-all">📄</button>

    <script src="script.js"></script>
</body>
</html>

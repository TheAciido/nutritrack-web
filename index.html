<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white font-sans pb-20">

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-4 transition-all duration-500">
        <div class="relative bg-slate-900 border border-white/10 p-8 rounded-[40px] max-w-lg w-full shadow-2xl">
            <h2 class="text-3xl font-black text-cyan-400 text-center mb-6 uppercase italic">BioSync IA</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="u-age" placeholder="Edad" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white">
                    <input type="number" id="u-weight" placeholder="Peso (kg)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white">
                </div>
                <select id="u-act" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="1.2">Poco ejercicio</option>
                    <option value="1.55" selected>Gym 3-5 días</option>
                    <option value="1.9">Atleta Élite</option>
                </select>
                <select id="u-goal" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="perder">Bajar Grasa</option>
                    <option value="recomposicion" selected>Recomposición</option>
                    <option value="ganar">Ganar Músculo</option>
                </select>
                <textarea id="u-likes" placeholder="¿Qué comida te gusta?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-20 text-sm text-white resize-none"></textarea>
                <button onclick="iniciar()" class="w-full bg-cyan-500 text-black py-5 rounded-3xl font-black uppercase tracking-widest active:scale-95 transition-all">Sincronizar Ahora</button>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
        <div class="font-black text-cyan-400 italic text-xl uppercase">BioSync</div>
        <button onclick="reset()" class="text-[9px] text-red-500 font-bold border border-red-500/20 px-3 py-1 rounded-full uppercase">Reset</button>
    </nav>

    <main id="capture-area" class="max-w-4xl mx-auto px-6 mt-6">
        <div class="bg-black/40 border border-cyan-500/20 p-5 rounded-3xl mb-8">
            <p id="ia-insights" class="text-xs font-mono text-cyan-400 leading-relaxed">> Sistema Online...</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8 text-center">
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase">Calorías</p>
                <div id="res-cal" class="text-3xl font-black text-white mt-1">0</div>
            </div>
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-blue-500/20">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Agua</p>
                <div class="text-2xl font-black my-1"><span id="res-water">0.0</span>L</div>
                <button onclick="addWater()" class="w-full bg-blue-500/10 py-1 rounded-lg text-[9px] font-black text-blue-400 border border-blue-500/20 uppercase">+250ml</button>
            </div>
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-white/5 col-span-2 md:col-span-1">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">XP Rango</p>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="res-xp" class="bg-cyan-400 h-full w-0 transition-all"></div></div>
            </div>
        </div>

        <h3 class="text-xl font-black italic mb-4 uppercase">Plan 30 Días</h3>
        <div id="res-dieta" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <button onclick="pdf()" class="fixed bottom-6 right-6 bg-cyan-500 text-black w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-xl z-50">📄</button>

    <script src="script.js"></script>
</body>
</html>
